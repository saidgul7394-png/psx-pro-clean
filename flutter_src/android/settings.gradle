pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        if (file("local.properties").exists()) {
            file("local.properties").withInputStream { properties.load(it) }
        }
        return properties.getProperty("flutter.sdk")
    }
    includeBuild("${flutterSdkPath()}/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-gradle-plugin"
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

include ':app'

// Ye line plugins ko load karne ke liye zaroori hai
def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()
def plugins = new Properties()
def pluginsFile = new File(rootProject.projectDir.parentFile, '.flutter-plugins')
if (pluginsFile.exists()) {
    pluginsFile.withReader('UTF-8') { reader -> plugins.load(reader) }
}

plugins.each { name, path ->
    include ":$name"
    project(":$name").projectDir = new File(path)
}
